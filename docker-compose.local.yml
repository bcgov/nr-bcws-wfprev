services:
  api-dev:
    build:
      context: server/wfprev-api
      dockerfile: Dockerfile.local
    profiles:
      - dev
      - dev-watch
    environment:
      SPRING_PROFILES_ACTIVE: dev
      REPORT_GENERATOR_LAMBDA_URL: http://host.docker.internal:9000/2015-03-31/functions/function/invocations
      REPORT_GENERATOR_SERVICE_URL: http://mock-report-generator
      WFDM_BASE_URL: https://i1bcwsapi.nrs.gov.bc.ca/wfdm-document-management-api
    volumes:
      - ./server/wfprev-api/target:/app/target
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgis/postgis:17-3.4
    volumes:
      - ./docker/db-init:/docker-entrypoint-initdb.d
      - ./wfprev.dump:/dump/wfprev.dump
    environment:
      - SKIP_RESTORE=${SKIP_RESTORE}

  client:
    build:
      context: client/wfprev-war
      dockerfile: Dockerfile.local
      target: runner
    profiles:
      - dev-static
    ports:
      - "4200:8080"
    networks:
      - wfprev-network
    volumes:
      - ./docker/login-mock.html:/app/dist/wfprev/login-mock.html
    depends_on:
      api-dev:
        condition: service_started
      db:
        condition: service_healthy

  client-watch:
    build:
      context: client/wfprev-war
      dockerfile: Dockerfile.local
      target: dev
    profiles:
      - dev
    ports:
      - "4200:8080"
    networks:
      wfprev-network:
        aliases:
          - client
    volumes:
      - ./client/wfprev-war/src/main/angular:/app
      - /app/node_modules
      - ./docker/login-mock.html:/app/src/login-mock.html
    depends_on:
      api-dev:
        condition: service_started
      db:
        condition: service_healthy
