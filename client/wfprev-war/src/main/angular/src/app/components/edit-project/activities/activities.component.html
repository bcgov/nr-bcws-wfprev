<div class="fiscals-container">
  <mat-expansion-panel [expanded]='true' class="expansion-panel" #activitiesPanel>
    <mat-expansion-panel-header>
      <div class="header-container">
        <wfprev-expansion-indicator [isExpanded]="activitiesPanel.expanded"></wfprev-expansion-indicator>
        <span class="project-title">Activities</span>
        @if (fiscalGuid) {
          <wfprev-icon-button
            class="add-activity"
            [text]="'Add Activity'"
            [icon]="'/assets/add-button.svg'"
            [alt]="'add-activity'"
            [iconSize]="19"
            [disabled]="isNewActivityBeingAdded || isReadonly"
            (clicked)="addActivity()">
          </wfprev-icon-button>
        }
      </div>
    </mat-expansion-panel-header>

    @if (isLoading) {
      <div class="spinner-container">
        <mat-progress-spinner mode="indeterminate" diameter="36" color="primary"></mat-progress-spinner>
      </div>
    }

    @if (!isLoading && activityViews?.length) {
      <div>
        @for (view of activityViews; track view; let i = $index) {
          <div [id]="'activity-' + i" class="activity-item-wrapper">
            <wfprev-fiscal-activity-item
              [activityForm]="view.form"
              [activity]="view.data"
              [index]="i"
              [isExpanded]="view.isExpanded"
              [isReadonly]="isReadonly"
              [fiscalGuid]="fiscalGuid"
              [isActivityDirty]="view.isDirty"
              [isActivitySaving]="view.isSaving"
              [canDelete]="canDeleteActivity(view)"
              [deleteIconUrl]="getDeleteIcon(view)"
              [silvicultureBaseCode]="silvicultureBaseCode"
              [contractPhaseCode]="contractPhaseCode"
              [fundingSourceCode]="fundingSourceCode"
              (expandedChange)="view.isExpanded = $event"
              (toggleResultsReportable)="toggleResultsReportableInd(view)"
              (toggleActivityStatus)="toggleActivityStatus(view)"
              (delete)="onDeleteActivity(view)"
              (cancel)="onCancelActivity(view)"
              (save)="onSaveActivity(view)"
              (filesUpdated)="onFilesChanged()"
            ></wfprev-fiscal-activity-item>
          </div>
        }
      </div>
    }

    @if (!isLoading && !activityViews?.length) {
      <div class="wf-empty-state">
        <p class="empty-state-text">No Activities have been added.</p>
      </div>
    }
  </mat-expansion-panel>
</div>
