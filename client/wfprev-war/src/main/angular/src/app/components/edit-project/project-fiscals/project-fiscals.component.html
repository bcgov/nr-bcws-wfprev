<div class="fiscals-container">
  <div>
    <div class="button-row">
      <wfprev-icon-button class="add-new-fiscal" [text]="'Add New Fiscal'" [icon]="'assets/add-button.svg'"
        [alt]="'add-new-fiscal'" [iconSize]="19" [disabled]="hasUnsavedFiscal" (clicked)="addNewFiscal()">
      </wfprev-icon-button>
    </div>
    <div class=fiscal-tab-wrapper>
      <mat-tab-group class="wf-sub-tab" mat-stretch-tabs="false" animationDuration="0ms" disableRipple="true"
        *ngIf="projectFiscals?.length; else noFiscals" [(selectedIndex)]="selectedTabIndex"
        (selectedTabChange)="onTabChange($event.index)">
        <mat-tab *ngFor="let fiscal of projectFiscals; let i = index">
          <ng-template mat-tab-label>
            <div class="custom-tab-label">
              <div class="label-title" [matTooltip]="fiscal.projectFiscalName">{{fiscal.projectFiscalName || 'New
                Fiscal'}}</div>
              <div class="label-subtitle">{{ fiscal.fiscalYearFormatted || 'YYYY/YY' }}</div>
            </div>
          </ng-template>
          <mat-accordion [multi]="true">
            <mat-expansion-panel [expanded]="true" class="fiscal-expansion-panel" #panel="matExpansionPanel">
              <mat-expansion-panel-header>
                <div class="header-container">
                  <wfprev-expansion-indicator [isExpanded]="panel.expanded"></wfprev-expansion-indicator>
                  <span class="project-title">Details</span>

                  <div class="status-actions">
                    <div class="status-wrapper">
                      <span>Status:</span>
                      <wfprev-status-badge [icon]="getStatusIcon(fiscal.planFiscalStatusCode?.planFiscalStatusCode)"
                        [label]="getStatusDescription(i) || ''">
                      </wfprev-status-badge>
                    </div>


                    <wfprev-dropdown-button [status]="fiscal.planFiscalStatusCode?.planFiscalStatusCode"
                      [isApproved]="!fiscalForms[i].get('isApprovedInd')?.value" [index]="i" [fiscal]="fiscal"
                      [isDirty]="fiscalForms[i]?.dirty" (actionSelected)="onFiscalAction($event)">
                    </wfprev-dropdown-button>
                  </div>
                </div>
              </mat-expansion-panel-header>
              <form class="form-grid" *ngIf="fiscalForms[i]" [formGroup]="fiscalForms[i]">

                <div class="form-item fiscal-activity-name">
                  <wfprev-input-field [id]="'projectFiscalName'" [label]="'Fiscal Activity Name'"
                    [placeholder]="'Descriptor including site and activity category'"
                    [control]="getFiscalControl(i, 'projectFiscalName')"
                    [tooltip]="getFiscalControl(i, 'projectFiscalName')?.value" [required]="true"
                    [errorMessages]="{ maxlength: messages.maxLengthExceeded }" />
                </div>

                <div class="form-item">
                  <wfprev-select-field [label]="'Activity Category'" [required]="true"
                    [control]="getFiscalControl(i, 'activityCategoryCode')" [options]="activityCategoryCode"
                    [optionValueField]="'activityCategoryCode'" [optionLabelField]="'description'"
                    [tooltip]="getCodeDescription(CodeTableKeys.ACTIVITY_CATEGORY_CODE)" id="activityCategoryCode"
                    placeholder="Select" />
                </div>

                <div class="form-item">
                  <label>Fiscal Year<span class="required">*</span></label>
                  <select id="fiscalYear" formControlName="fiscalYear">
                    <option value="" disabled selected hidden>Select</option>
                    <option *ngFor="let year of fiscalYears" [value]="year.split('/')[0]">{{ year }}</option>
                  </select>
                </div>


                <div class="form-item">
                  <wfprev-select-field class="form-item" [label]="'Proposal Type'" [required]="true"
                    [control]="getFiscalControl(i, 'proposalTypeCode')" [options]="proposalTypeCode"
                    [optionValueField]="'proposalTypeCode'" [optionLabelField]="'description'"
                    [tooltip]="getCodeDescription(CodeTableKeys.PROPOSAL_TYPE_CODE)" id="proposalTypeCode"
                    placeholder="Select" />
                </div>

                <div class="form-item">
                  <wfprev-input-field [id]="'fiscalPlannedProjectSizeHa'" [label]="'Planned Hectares (Ha)'"
                    [placeholder]="'0'" [type]="'number'" [control]="getFiscalControl(i, 'fiscalPlannedProjectSizeHa')"
                    [tooltip]="getFiscalControl(i, 'fiscalPlannedProjectSizeHa')?.value" [errorMessages]="{
                        min: messages.positiveNumber,
                        max: messages.maxLengthExceeded,
                        maxlength: messages.maxLengthExceeded
                      }" />
                </div>

                <div class="form-item">
                  <wfprev-input-field [id]="'fiscalCompletedSizeHa'" [label]="'Completed Hectares (Ha)'"
                    [placeholder]="'0'" [type]="'number'" [control]="getFiscalControl(i, 'fiscalCompletedSizeHa')"
                    [tooltip]="getFiscalControl(i, 'fiscalCompletedSizeHa')?.value"
                    [errorMessages]="{ min: messages.positiveNumber, maxlength: messages.maxLengthExceeded, max: messages.maxLengthExceeded }" />
                </div>

                <div class="form-item">
                  <wfprev-input-field [id]="'resultsOpeningId'" [label]="'RESULTS ID'"
                    [placeholder]="'e.g., 98734702882'" [control]="getFiscalControl(i, 'resultsOpeningId')"
                    [tooltip]="getFiscalControl(i, 'resultsOpeningId')?.value"
                    [errorMessages]="{ maxlength: messages.maxLengthExceeded }" />
                </div>

                <div class="form-item full-width">
                  <wfprev-textarea [label]="'Description'"
                    [placeholder]="'Describe the activities planned for this fiscal year and how funding is being used.'"
                    [rows]="4" [maxLength]="500" [control]="getFiscalControl(i, 'projectFiscalDescription')"
                    [required]="true">
                  </wfprev-textarea>
                </div>
                <!-- Delivery Partners Section -->
                <div class="sub-section">
                  <span class="sub-title"> Delivery Partners</span>
                  <div class="separator"></div>
                </div>
                <div class="form-item toggle-width">
                  <label>First Nations Engagement</label>
                  <div class="toggle-container">
                    <mat-slide-toggle id="firstYearNationsEngagement" formControlName="firstNationsEngagementInd">
                    </mat-slide-toggle>
                    <span class="toggle-label">
                      {{ fiscalForms[i].value?.firstNationsEngagementInd ? 'Yes' : 'No' }}
                    </span>
                  </div>
                </div>
            </mat-expansion-panel>
            <div class="activities-map-container">
              <div>
                <wfprev-performance-updates [fiscalGuid]="fiscal.projectPlanFiscalGuid"></wfprev-performance-updates>
                <wfprev-activities class="activities-panel" [isReadonly]="isCurrentFiscalReadonly()"
                  [fiscalGuid]="currentFiscalGuid" (boundariesUpdated)="onBoundariesChanged()"></wfprev-activities>
              </div>
              <div class="fiscal-and-endorsement">
                <wfprev-fiscal-map class="fiscal-map-panel" *ngIf="selectedTabIndex === i"
                  [fiscalGuid]="selectedTabIndex" [selectedFiscalYear]="projectFiscals[selectedTabIndex]?.fiscalYear"
                  #fiscalMapRef></wfprev-fiscal-map>
                <wfprev-endorsement-approval [fiscal]="projectFiscals[i]" [currentUser]="currentUser"
                  [currentIdir]="currentIdir" (saveEndorsement)="onSaveEndorsement($event)"
                  [isSaving]="isSavingFiscal[i]"></wfprev-endorsement-approval>
              </div>
            </div>
            </mat-expansion-panel>
            <div class="activities-map-container">
              <wfprev-activities class="activities-panel" [isReadonly]="isCurrentFiscalReadonly()"
                [fiscalGuid]="currentFiscalGuid" (boundariesUpdated)="onBoundariesChanged()"></wfprev-activities>
              <div class="fiscal-and-endorsement">
                <wfprev-fiscal-map class="fiscal-map-panel" *ngIf="selectedTabIndex === i"
                  [fiscalGuid]="selectedTabIndex" [selectedFiscalYear]="projectFiscals[selectedTabIndex]?.fiscalYear"
                  #fiscalMapRef></wfprev-fiscal-map>
                <wfprev-endorsement-approval [fiscal]="projectFiscals[i]" [currentUser]="currentUser"
                  [currentIdir]="currentIdir" (saveEndorsement)="onSaveEndorsement($event)"
                  [isSaving]="isSavingFiscal[i]"></wfprev-endorsement-approval>
              </div>
            </div>
          </mat-accordion>
        </mat-tab>
      </mat-tab-group>
    </div>
    <ng-template #noFiscals>
      <div class="no-fiscals">
        No Fiscal Activities have been added.
      </div>
    </ng-template>
  </div>
</div>
